<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Radio Coravox</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    html, body{
      width:100%; height:100%; overflow:hidden;
      background:#000; font-family: system-ui, -apple-system, sans-serif;
      color:#f5c85b; -webkit-text-size-adjust:100%; touch-action:manipulation;
    }
    :root{ --safe-b: env(safe-area-inset-bottom, 0px); --safe-t: env(safe-area-inset-top, 0px); }

    #app{ position:fixed; inset:0; overflow:hidden; }
    
    /* ARO / LOGO */
    #center{ position:absolute; left:0; right:0; top: calc(14px + var(--safe-t)); display:flex; justify-content:center; pointer-events:none; z-index:2; }
    #halo{ width:300px; height:300px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid #f5c85b; box-shadow:0 0 55px rgba(245,200,91,0.9); position:relative; }
    #logo{ width:88%; height:88%; border-radius:50%; object-fit:contain; }
    
    /* ANIMACIONES */
    body.playing #halo { animation:glowPulse 1.2s infinite ease-in-out; }
    @keyframes glowPulse { 0% { box-shadow:0 0 40px rgba(255,255,255,0.25); } 50% { box-shadow:0 0 95px rgba(255,255,255,0.95); } 100% { box-shadow:0 0 40px rgba(255,255,255,0.25); } }

    /* CONTROLES */
    #controls{ position:absolute; left:50%; transform:translateX(-50%); top: calc(320px + var(--safe-t)); width: 92%; text-align:center; z-index:3; }
    #btnPlay{ padding:12px 18px; border-radius:999px; border:none; background:#f5c85b; color:#000; font-weight:900; min-width:200px; cursor:pointer; }
    #songLabel{ margin-top:8px; font-size:13px; color:#fff; }

    /* ZONA INFERIOR (Chat y Ranking) */
    #belowZone{ position:absolute; left:10px; right:10px; top: calc(440px + var(--safe-t)); bottom: calc(100px + var(--safe-b)); display:grid; grid-template-columns: 1.3fr 0.7fr; gap:10px; z-index:4; }
    #chatPanel{ border-radius:14px; background: rgba(255,255,255,0.05); border:1px solid rgba(245,200,91,0.18); display:flex; flex-direction:column; overflow:hidden; }
    #chatBox{ padding:10px; overflow-y:auto; flex:1; font-size:12px; color:#fff; }
    .chatLine{ margin-bottom:6px; }
    .chatUserName{ font-weight:900; margin-right:4px; }
    .chatUserName.admin{ color:#ffd86b; text-shadow:0 0 6px rgba(255,216,107,.7); }
    .chatSys{ color:#f5c85b; font-style:italic; opacity:0.8; }

    /* BOTONES */
    #fansActions{ display:flex; flex-direction:column; gap:8px; }
    .pulseLink{ background:transparent; border:none; font-weight:900; cursor:pointer; animation: pulseText 1.2s infinite; text-align:left; }
    @keyframes pulseText{ 0%, 100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
    #requestSongBtn{ color:#7ad9ff; }

    /* BARRA CHAT */
    #bottomBar{ position:absolute; left:0; right:0; bottom:0; padding: 10px 10px calc(10px + var(--safe-b)); display:flex; gap:8px; background: rgba(0,0,0,0.8); }
    #chatInput{ flex:1; border-radius:999px; border:1px solid #f5c85b; background:#000; color:#fff; padding:8px 15px; outline:none; }
    #chatSend{ background:#f5c85b; border:none; border-radius:999px; padding:0 15px; font-weight:900; }
    
    /* MODALES */
    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modalBox{ width:90%; max-width:380px; background:#111; border:1px solid #f5c85b; border-radius:15px; padding:20px; }
    .modalInput{ width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #333; background:#000; color:#fff; }
    .modalBtn{ width:100%; padding:10px; background:#f5c85b; border:none; font-weight:900; border-radius:5px; }
  </style>
</head>

<body>
<div id="app">
  <div id="center">
    <div id="halo"><img id="logo" src="logo_coravox.png" /></div>
  </div>

  <div id="controls">
    <div id="listenersLabel">👥 Oyentes: 0</div>
    <button id="btnPlay">▶ Escuchar</button>
    <div id="songLabel">🎵 Ahora suena: —</div>
  </div>

  <div id="belowZone">
    <div id="chatPanel"><div id="chatBox"></div></div>
    <div id="rightPanel">
        <div id="fansActions">
            <button id="requestSongBtn" class="pulseLink">🎧 Pide tu canción</button>
        </div>
    </div>
  </div>

  <div id="bottomBar">
    <input id="chatInput" placeholder="Escribe algo..." />
    <button id="chatSend">Enviar</button>
    <button id="btnName" style="background:none; border:none; font-size:20px;">👤</button>
  </div>
</div>

<div id="requestOverlay" class="overlay">
    <div class="modalBox">
        <h3 style="color:#f5c85b">Pide tu canción</h3>
        <input id="inputCancion" class="modalInput" placeholder="Artista - Canción" />
        <button id="btnEnviarPedido" class="modalBtn">ENVIAR A CABINA</button>
        <button onclick="document.getElementById('requestOverlay').style.display='none'" style="background:none; border:none; color:#666; width:100%; margin-top:10px;">Cerrar</button>
    </div>
</div>

<div id="nameOverlay" class="overlay" style="display:flex;">
    <div class="modalBox">
        <h3>Tu Nombre</h3>
        <input id="nameInput" class="modalInput" value="Oyente" />
        <button id="nameOk" class="modalBtn">Entrar</button>
    </div>
</div>

<audio id="player"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  /* CONFIG */
  var STREAM_URL = "https://a13.my-control-panel.com/listen/radio_coravox/radio.mp3";
  var firebaseConfig = {
    apiKey: "AIzaSyC8jq2iODj6DwfTSktgZ7ia84oeMxxPjNE",
    authDomain: "coravox-602a0.firebaseapp.com",
    projectId: "coravox-602a0",
    storageBucket: "coravox-602a0.firebasestorage.app",
    messagingSenderId: "629472102664",
    appId: "1:629472102664:web:56e539689983458ada84bd"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  var nickname = localStorage.getItem("rcx_nickname") || "Oyente";
  var isAdmin = (nickname === "Coravox");
  // Validar si el usuario es administrador para mostrar funciones extra
if (nickname === "Coravox") {
    // Aquí puedes añadir elementos que solo tú verás
    // Por ejemplo, si tienes un botón para borrar mensajes o gestionar la radio:
    const adminPanel = document.createElement('div');
    adminPanel.style.cssText = "background: rgba(245, 200, 91, 0.2); padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 12px; border: 1px dashed #f5c85b;";
    adminPanel.innerHTML = "<strong>Modo Admin Activo</strong><br>Panel de control de pedidos listo.";
    
    document.getElementById("rightPanel").prepend(adminPanel);
    
    // Cambiar visualmente el estilo del nombre en el chat para el usuario local
    document.getElementById("btnName").style.color = "#f5c85b";
}
  if(nickname !== "Oyente") document.getElementById("nameOverlay").style.display="none";

  /* CHAT RESTAURADO */
  var chatBox = document.getElementById("chatBox");
  var colorPalette = ["#f5c85b","#ff7ad9","#7ad9ff","#9dff7a","#ffb27a"];
  
  function getColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colorPalette[Math.abs(hash) % colorPalette.length];
  }

  db.collection("mensajes-chat").orderBy("creado", "desc").limit(20).onSnapshot(snap => {
    chatBox.innerHTML = "";
    snap.docs.reverse().forEach(doc => {
        let d = doc.data();
        let line = document.createElement("div");
        line.className = "chatLine";
        
        if(d.tipo === "system") {
            line.className += " chatSys";
            line.textContent = d.mensaje;
        } else {
            let color = (d.usuario === "Coravox") ? "#ffd86b" : getColor(d.usuario);
            let adminClass = (d.usuario === "Coravox") ? " admin" : "";
            line.innerHTML = `<span class="chatUserName${adminClass}" style="color:${color}">${d.usuario}:</span> ${d.mensaje}`;
        }
        chatBox.appendChild(line);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  document.getElementById("chatSend").onclick = () => {
    let msg = document.getElementById("chatInput").value.trim();
    if(msg) {
        db.collection("mensajes-chat").add({
            usuario: nickname,
            mensaje: msg,
            creado: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("chatInput").value = "";
    }
  };

  /* SPOTIFY & AUDIO */
  document.getElementById("requestSongBtn").onclick = () => document.getElementById("requestOverlay").style.display="flex";
  
  document.getElementById("btnEnviarPedido").onclick = () => {
      let cancion = document.getElementById("inputCancion").value.trim();
      if(cancion) {
          db.collection("pedidos_spotify").add({
              cancion: cancion,
              oyente: nickname,
              atendido: false,
              fecha: firebase.firestore.FieldValue.serverTimestamp()
          });
          document.getElementById("requestOverlay").style.display="none";
          document.getElementById("inputCancion").value = "";
      }
  };

  var audio = document.getElementById("player");
  document.getElementById("btnPlay").onclick = function() {
      if(audio.paused) {
          audio.src = STREAM_URL + "?t=" + Date.now();
          audio.play();
          this.textContent = "⏸ Pausar";
          document.body.classList.add("playing");
      } else {
          audio.pause();
          this.textContent = "▶ Escuchar";
          document.body.classList.remove("playing");
      }
  };

  document.getElementById("nameOk").onclick = () => {
      nickname = document.getElementById("nameInput").value.trim() || "Oyente";
      localStorage.setItem("rcx_nickname", nickname);
      document.getElementById("nameOverlay").style.display = "none";
      db.collection("mensajes-chat").add({
          mensaje: "👋 " + nickname + " se unió.",
          tipo: "system",
          creado: firebase.firestore.FieldValue.serverTimestamp()
      });
  };
</script>
</body>
</html>
