<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Radio Coravox</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    html, body{
      width:100%; height:100%; overflow:hidden;
      background:#000; font-family: system-ui, -apple-system, Roboto, sans-serif;
      color:#f5c85b; -webkit-text-size-adjust:100%; touch-action:manipulation;
    }

    :root{
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    #app{ position:fixed; inset:0; overflow:hidden; }

    /* ARO / LOGO */
    #center{
      position:absolute; left:0; right:0;
      top: calc(10px + var(--safe-t));
      display:flex; justify-content:center; pointer-events:none; z-index:2;
    }

    #halo{
      width:240px; height:240px; 
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at center, #000 0 60%, #000 60%, transparent 61%);
      border:3px solid #f5c85b; box-shadow:0 0 45px rgba(245,200,91,0.8);
      position:relative;
    }

    #logo{ width:88%; height:88%; border-radius:50%; object-fit:contain; }

    /* CONTROLES Y BOTONES */
    #controls{
      position:absolute; left:50%; transform:translateX(-50%);
      top: calc(10px + var(--safe-t) + 250px);
      width: 94%; max-width: 420px; text-align:center; z-index:3;
    }

    #btnPlay{
      padding:10px 18px; border-radius:999px; border:none;
      background:#f5c85b; color:#000; font-size:14px; font-weight:900;
      text-transform:uppercase; min-width:180px; cursor:pointer;
      margin-bottom: 10px;
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 5px;
    }

    .btn-action {
      flex: 1;
      padding: 12px 8px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 12px;
      border: none;
      cursor: pointer;
      text-align: center;
      animation: pulseText 1.2s ease-in-out infinite;
    }

    #btnSpotify { background: #1DB954; color: white; }
    #superFansBtn { background: #ffd54f; color: #000; }

    @keyframes pulseText{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.03); }
      100%{ transform:scale(1); }
    }

    /* ZONA MEDIA (CHAT Y FANS) */
    #belowZone{
      position:absolute; left:10px; right:10px;
      top: calc(10px + var(--safe-t) + 250px + 125px);
      bottom: calc(70px + var(--safe-b));
      display:grid; grid-template-columns: 1.2fr 0.8fr;
      gap:8px; z-index:4;
    }

    #chatPanel{
      border-radius:14px; background: rgba(255,255,255,0.05);
      border:1px solid rgba(245,200,91,0.15); display:flex; flex-direction:column;
      overflow: hidden;
    }

    #chatBox{
      padding:8px; overflow-y:auto; flex:1; font-size:12px; color:#fff;
      max-height: 160px; /* Chat más compacto para que quepa todo */
    }

    #fansPanel{
      border-radius:14px; background: rgba(255,255,255,0.05);
      border:1px solid rgba(245,200,91,0.15); padding:8px; overflow-y:auto;
    }

    .likeTitle { font-size: 11px; font-weight: 900; margin-bottom: 5px; color: #f5c85b; }
    .likeRow { font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 4px; }

    /* BARRA INFERIOR */
    #bottomBar{
      position:absolute; left:0; right:0; bottom:0;
      padding: 10px 10px calc(10px + var(--safe-b));
      display:flex; align-items:center; gap:6px;
      background: rgba(0,0,0,0.9); z-index:10;
    }

    #chatInput{
      flex:1; border-radius:999px; border:1px solid #f5c85b;
      background:#000; color:#fff; font-size:12px; padding:8px 12px;
    }

    .roundBtn{
      width:36px; height:36px; border-radius:50%; border:none;
      display:flex; align-items:center; justify-content:center; font-size:16px;
    }

    #modalSpotify {
      position:fixed; inset:0; background:rgba(0,0,0,0.9);
      z-index:100; display:none; align-items:center; justify-content:center;
    }
  </style>
</head>

<body>
<div id="app">

  <div id="center">
    <div id="halo">
      <img id="logo" src="logo_coravox.png" alt="Radio Coravox" />
    </div>
  </div>

  <div id="controls">
    <button id="btnPlay">▶ Escuchar</button>
    
    <div class="action-row">
      <button id="btnSpotify" class="btn-action" onclick="document.getElementById('modalSpotify').style.display='flex'">
        🟢 Pide Canción
      </button>
      <button id="superFansBtn" class="btn-action" onclick="window.open('https://www.paypal.com/webapps/billing/plans/subscribe?plan_id=P-02N26347CY290173YNFQSTTY', '_blank')">
        ⭐ Super Fans $1
      </button>
    </div>

    <div id="status" style="font-size:11px; margin-top:5px; opacity:0.7;">Listo para conectar...</div>
  </div>

  <div id="belowZone">
    <div id="chatPanel">
      <div style="font-size:10px; padding:5px; color:#f5c85b; border-bottom:1px solid rgba(245,200,91,0.1);">Chat en vivo</div>
      <div id="chatBox"></div>
    </div>

    <div id="fansPanel">
      <div class="likeTitle">TOP FANS ❤️</div>
      <div id="likeRanking"></div>
    </div>
  </div>

  <div id="bottomBar">
    <input id="chatInput" type="text" placeholder="Escribe un mensaje..." />
    <button class="roundBtn" style="background:#2b8cff; color:white;">f</button>
    <button class="roundBtn" style="background:#2bdc66; color:white;">w</button>
    <button class="roundBtn" style="background:#ff7ad9; color:white;">🎁</button>
  </div>

</div>

<div id="modalSpotify">
    <div style="background:#111; border:2px solid #1DB954; border-radius:15px; padding:20px; width:280px;">
        <h3 style="color:#1DB954; margin-bottom:10px; font-size:16px;">Pedido Musical</h3>
        <input id="inputCancion" type="text" placeholder="Artista - Canción" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
        <button id="btnEnviarSpotify" style="width:100%; padding:10px; background:#1DB954; color:white; border:none; margin-top:10px; font-weight:bold; border-radius:8px;">ENVIAR A CABINA</button>
        <button onclick="document.getElementById('modalSpotify').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#777;">Cerrar</button>
    </div>
</div>

<audio id="player"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyC8jq2iODj6DwfTSktgZ7ia84oeMxxPjNE",
    authDomain: "coravox-602a0.firebaseapp.com",
    projectId: "coravox-602a0",
    storageBucket: "coravox-602a0.firebasestorage.app",
    messagingSenderId: "629472102664",
    appId: "1:629472102664:web:56e539689983458ada84bd"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  document.getElementById('btnEnviarSpotify').addEventListener('click', async () => {
    const cancion = document.getElementById('inputCancion').value;
    if(cancion.trim() !== "") {
      await db.collection("pedidos_spotify").add({
        cancion: cancion,
        atendido: false,
        fecha: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert("✅ Pedido enviado con éxito");
      document.getElementById('modalSpotify').style.display = 'none';
      document.getElementById('inputCancion').value = "";
    }
  });
</script>

</body>
</html>
