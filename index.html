<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Radio Coravox - Completo</title>

  <style>
    /* ... (Mantenemos los estilos base anteriores) ... */
    *{ margin:0; padding:0; box-sizing:border-box; }
    html, body{ width:100%; height:100%; overflow:hidden; background:#000; font-family: sans-serif; color:#f5c85b; }
    :root{ --safe-b: env(safe-area-inset-bottom, 0px); --safe-t: env(safe-area-inset-top, 0px); }

    #app{ position:fixed; inset:0; overflow:hidden; }
    #center{ position:absolute; left:0; right:0; top: calc(10px + var(--safe-t)); display:flex; justify-content:center; z-index:2; }
    #halo{ width:260px; height:260px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid #f5c85b; box-shadow:0 0 45px rgba(245,200,91,0.6); }
    #logo{ width:88%; height:88%; border-radius:50%; object-fit:contain; }

    /* CONTROLES */
    #controls{ position:absolute; left:50%; transform:translateX(-50%); top: calc(285px + var(--safe-t)); width: 92%; text-align:center; z-index:3; }
    #btnPlay{ padding:10px 20px; border-radius:999px; border:none; background:#f5c85b; color:#000; font-weight:900; min-width:180px; margin-bottom:5px; }
    #songLabel{ font-size:12px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ZONA INFERIOR REORGANIZADA */
    #belowZone{ position:absolute; left:10px; right:10px; top: calc(385px + var(--safe-t)); bottom: calc(85px + var(--safe-b)); display:grid; grid-template-columns: 1.2fr 0.8fr; gap:10px; z-index:4; }
    
    /* PANEL IZQUIERDO: CHAT */
    #chatPanel{ border-radius:12px; background: rgba(255,255,255,0.05); border:1px solid rgba(245,200,91,0.2); display:flex; flex-direction:column; overflow:hidden; }
    #chatBox{ padding:8px; overflow-y:auto; flex:1; font-size:11px; color:#fff; }
    .chatUserName.admin{ color:#ffd86b; text-shadow:0 0 8px gold; font-weight:bold; }

    /* PANEL DERECHO: RANKING Y ACCIONES */
    #rightPanel{ display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
    
    .card{ background: rgba(255,255,255,0.07); border-radius:10px; padding:8px; border:1px solid rgba(245,200,91,0.1); }
    .cardTitle{ font-size:10px; font-weight:900; text-transform:uppercase; margin-bottom:5px; color:#f5c85b; display:flex; align-items:center; gap:4px; }
    
    /* TOP FANS */
    #topList{ font-size:11px; list-style:none; }
    .topItem{ display:flex; justify-content:space-between; margin-bottom:3px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:2px; }

    /* BOTONES ACCIÓN */
    .btnAction{ width:100%; padding:8px; border-radius:6px; border:none; font-weight:bold; font-size:11px; margin-bottom:5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
    #btnSpotify{ background:#1DB954; color:#fff; }
    #btnGift{ background:#ff4757; color:#fff; }
    #btnShare{ background:#2f3542; color:#fff; }

    /* BARRA INFERIOR */
    #bottomBar{ position:absolute; left:0; right:0; bottom:0; padding: 10px 10px calc(10px + var(--safe-b)); display:flex; gap:8px; background:#000; border-top:1px solid #222; }
    #chatInput{ flex:1; border-radius:20px; border:1px solid #444; background:#111; color:#fff; padding:8px 15px; outline:none; }
    #chatSend{ background:#f5c85b; border:none; border-radius:20px; padding:0 15px; font-weight:900; }
    
    /* MODALES */
    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; z-index:9999; padding:20px; }
    .modalBox{ width:100%; max-width:320px; background:#111; border:2px solid #f5c85b; border-radius:15px; padding:20px; position:relative; }
    .modalInput{ width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #333; background:#000; color:#fff; }
  </style>
</head>
<body>

<div id="app">
  <div id="center"><div id="halo"><img id="logo" src="logo_coravox.png" /></div></div>

  <div id="controls">
    <button id="btnPlay">▶ ESCUCHAR EN VIVO</button>
    <div id="songLabel">Cargando señal...</div>
  </div>

  <div id="belowZone">
    <div id="chatPanel"><div id="chatBox"></div></div>

    <div id="rightPanel">
        <div id="adminBadge" style="display:none; background:gold; color:black; font-size:9px; font-weight:900; text-align:center; border-radius:4px; padding:2px; margin-bottom:5px;">⭐ MODO ADMIN</div>
        
        <button id="btnSpotify" class="btnAction">🟢 Pedir Spotify</button>
        
        <div class="card">
            <div class="cardTitle">🏆 Top Fans</div>
            <div id="topList">
                <div class="topItem"><span>1. Usuario</span><span>🔥 150</span></div>
                <div class="topItem"><span>2. Oyente</span><span>🔥 120</span></div>
            </div>
        </div>

        <button id="btnGift" class="btnAction">🎁 Enviar Regalo</button>
        <button id="btnShare" class="btnAction">🔗 Compartir App</button>
    </div>
  </div>

  <div id="bottomBar">
    <input id="chatInput" placeholder="Mensaje..." />
    <button id="chatSend">Ir</button>
    <button id="btnSettings" style="background:none; border:none; color:#f5c85b;">⚙️</button>
  </div>
</div>

<div id="modalSpotify" class="overlay">
    <div class="modalBox">
        <h3 style="color:#1DB954">Pedido Musical</h3>
        <input id="inputCancion" class="modalInput" placeholder="Nombre de la canción o artista..." />
        <button id="btnEnviarSpotify" style="width:100%; padding:12px; background:#1DB954; color:white; border:none; border-radius:8px; font-weight:bold;">ENVIAR PEDIDO</button>
        <button onclick="cerrarModales()" style="width:100%; margin-top:10px; background:none; border:none; color:#777;">Cancelar</button>
    </div>
</div>

<div id="modalGift" class="overlay">
    <div class="modalBox">
        <h3>Enviar un Regalo</h3>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:15px; text-align:center; font-size:24px;">
            <div onclick="enviarRegalo('🍕')" style="cursor:pointer;">🍕</div>
            <div onclick="enviarRegalo('🍺')" style="cursor:pointer;">🍺</div>
            <div onclick="enviarRegalo('💎')" style="cursor:pointer;">💎</div>
        </div>
        <button onclick="cerrarModales()" style="width:100%; margin-top:20px; background:none; border:none; color:#777;">Cerrar</button>
    </div>
</div>

<audio id="player"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // ... (Tu firebaseConfig actual aquí) ...
  var firebaseConfig = {
    apiKey: "AIzaSyC8jq2iODj6DwfTSktgZ7ia84oeMxxPjNE",
    authDomain: "coravox-602a0.firebaseapp.com",
    projectId: "coravox-602a0",
    storageBucket: "coravox-602a0.firebasestorage.app",
    messagingSenderId: "629472102664",
    appId: "1:629472102664:web:56e539689983458ada84bd"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  var nickname = localStorage.getItem("rcx_nickname") || "Oyente";
  var isAdmin = (nickname === "Coravox");

  if(isAdmin) document.getElementById("adminBadge").style.display = "block";

  // --- LÓGICA DE MODALES ---
  function cerrarModales() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
  document.getElementById("btnSpotify").onclick = () => document.getElementById("modalSpotify").style.display='flex';
  document.getElementById("btnGift").onclick = () => document.getElementById("modalGift").style.display='flex';
  
  // COMPARTIR
  document.getElementById("btnShare").onclick = () => {
      if (navigator.share) {
          navigator.share({ title: 'Radio Coravox', text: '¡Escucha la mejor música en vivo!', url: window.location.href });
      } else { alert("Copia el link: " + window.location.href); }
  };

  // ENVIAR REGALO AL CHAT
  function enviarRegalo(emoji) {
      db.collection("mensajes-chat").add({
          usuario: nickname,
          mensaje: "ha enviado un regalo: " + emoji,
          tipo: "gift",
          creado: firebase.firestore.FieldValue.serverTimestamp()
      });
      cerrarModales();
  }

  // ENVIAR PEDIDO SPOTIFY
  document.getElementById("btnEnviarSpotify").onclick = () => {
      let cancion = document.getElementById("inputCancion").value.trim();
      if(cancion) {
          db.collection("pedidos_spotify").add({
              cancion: cancion,
              oyente: nickname,
              fecha: firebase.firestore.FieldValue.serverTimestamp()
          });
          cerrarModales();
          document.getElementById("inputCancion").value = "";
          alert("¡Pedido enviado a cabina!");
      }
  };

  // --- RESTAURAR CHAT Y COLORES ---
  var chatBox = document.getElementById("chatBox");
  function getColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    let colors = ["#f5c85b","#7ad9ff","#ff7ad9","#9dff7a","#ff9f43"];
    return colors[Math.abs(hash) % colors.length];
  }

  db.collection("mensajes-chat").orderBy("creado", "desc").limit(25).onSnapshot(snap => {
    chatBox.innerHTML = "";
    snap.docs.reverse().forEach(doc => {
        let d = doc.data();
        let line = document.createElement("div");
        line.style.marginBottom = "5px";
        
        let color = (d.usuario === "Coravox") ? "gold" : getColor(d.usuario || "Oyente");
        let adminClass = (d.usuario === "Coravox") ? " admin" : "";
        
        line.innerHTML = `<span class="chatUserName${adminClass}" style="color:${color}">${d.usuario}:</span> <span style="color:#eee">${d.mensaje}</span>`;
        chatBox.appendChild(line);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  // ENVIAR MENSAJE
  document.getElementById("chatSend").onclick = () => {
      let msg = document.getElementById("chatInput").value.trim();
      if(msg) {
          db.collection("mensajes-chat").add({
              usuario: nickname,
              mensaje: msg,
              creado: firebase.firestore.FieldValue.serverTimestamp()
          });
          document.getElementById("chatInput").value = "";
      }
  };

  // --- AUDIO ---
  var audio = document.getElementById("player");
  document.getElementById("btnPlay").onclick = function() {
      if(audio.paused) {
          audio.src = "https://a13.my-control-panel.com/listen/radio_coravox/radio.mp3?t=" + Date.now();
          audio.play();
          this.textContent = "⏸ PAUSAR SEÑAL";
      } else {
          audio.pause();
          this.textContent = "▶ ESCUCHAR EN VIVO";
      }
  };
</script>
</body>
</html>
